databases:
  - name: timeforge-db
    databaseName: timeforge
    user: timeforge

services:
  - type: web
    name: timeforge-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn timeforge.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: timeforge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_ENV
        value: "production"
      - key: PYTHON_VERSION
        value: "3.12.0"
