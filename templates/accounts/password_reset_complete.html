{% extends 'base.html' %}

{% block title %}Password Reset Complete | TimeForge{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center mt-5">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4 text-center">
            <h4 class="card-title mb-4">Password Reset Complete</h4>
            <i class="bi bi-check-circle text-success display-1 mb-3"></i>
            <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
            <div class="mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary">Log in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
