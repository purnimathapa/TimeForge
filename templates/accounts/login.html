{% extends 'base.html' %}

{% block title %}Login | TimeForge{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 78vh;">
    <div class="card shadow" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="empty-state-icon mb-3"><i class="bi bi-calendar3"></i></span>
                <h1 class="h4 mt-2 mb-1">Welcome to TimeForge</h1>
                <p class="text-muted small mb-0">Sign in to manage your timetables</p>
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
                    <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
                    <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
            </form>
            
            <div class="text-center mt-3">
                <a href="{% url 'accounts:password_reset' %}" class="text-decoration-none small">Forgot password?</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
